{% extends "base.html" %}
{% block title %}数据管理 — TCMS{% endblock %}

{% block content %}
<div x-data="importExport">
    <hgroup>
        <h1>导入 / 导出</h1>
    </hgroup>

    <div class="grid">
        <!-- 导入测试用例 -->
        <article>
            <header><h3>导入测试用例</h3></header>
            <p style="color: var(--pico-muted-color); font-size: 0.85em;">
                标题、模块、优先级、前置条件、步骤、标签
            </p>
            <label>
                <input type="file" @change="handleFile($event, 'test')" accept=".xlsx,.xls,.csv">
            </label>
        </article>

        <!-- 导入点检用例 -->
        <article>
            <header><h3>导入点检用例</h3></header>
            <p style="color: var(--pico-muted-color); font-size: 0.85em;">
                序号、类别、检查项目、评价标准
            </p>
            <label>
                <input type="file" @change="handleFile($event, 'check')" accept=".xlsx,.xls,.csv">
            </label>
        </article>
    </div>

    <!-- 预览弹窗 -->
    <dialog x-ref="previewDialog">
        <article>
            <header><h3>导入预览</h3></header>
            <template x-if="preview && preview.valid_rows">
                <div>
                    <p>已解析 <strong x-text="preview.valid_rows.length"></strong> 条，类型：<strong x-text="preview.file_type === 'check' ? '点检用例' : '测试用例'"></strong></p>
                    <template x-if="preview.errors && preview.errors.length > 0">
                        <div style="margin-bottom: 0.5rem;">
                            <template x-for="err in preview.errors" :key="err.row + err.field">
                                <p style="color: var(--pico-del-color); margin: 0; font-size: 0.85rem;">
                                    ⚠ 第<span x-text="err.row"></span>行: <span x-text="err.message"></span>
                                </p>
                            </template>
                        </div>
                    </template>
                    <div style="max-height: 300px; overflow-y: auto;">
                        <table>
                            <thead>
                                <tr>
                                    <th>#</th>
                                    <th>标题/检查项目</th>
                                    <th>模块/类别</th>
                                    <template x-if="preview.file_type === 'check'">
                                        <th>评价标准</th>
                                    </template>
                                </tr>
                            </thead>
                            <tbody>
                                <template x-for="(row, idx) in preview.valid_rows.slice(0, 20)" :key="idx">
                                    <tr>
                                        <td x-text="row._row || (idx + 1)"></td>
                                        <td x-text="row.title"></td>
                                        <td x-text="row.module || row.check_category"></td>
                                        <td x-show="preview.file_type === 'check'" x-text="row.check_criteria || ''"></td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                    <footer style="display: flex; gap: 0.5rem; justify-content: flex-end;">
                        <button class="secondary" @click="$refs.previewDialog.close(); preview=null;">取消</button>
                        <button class="contrast" @click="confirmImport()" :disabled="importing">
                            <span x-show="!importing">确认导入（<span x-text="preview.valid_rows.length"></span> 条）</span>
                            <span x-show="importing">导入中...</span>
                        </button>
                    </footer>
                </div>
            </template>
        </article>
    </dialog>

        <!-- 导出用例 -->
        <article>
            <header><h3>导出测试用例</h3></header>
            <label>
                模块筛选
                <select x-model="exportModule">
                    <option value="">全部</option>
                    <template x-for="m in modules" :key="m">
                        <option :value="m" x-text="m"></option>
                    </template>
                </select>
            </label>
            <button @click="exportCases()">导出用例 Excel</button>
        </article>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('alpine:init', () => {
    Alpine.data('importExport', () => ({
        modules: [],
        plans: [],
        exportModule: '',
        exportPriority: '',
        exportPlanId: '',
        preview: null,
        importing: false,

        async init() {
            try {
                const [modResp, planResp] = await Promise.all([
                    fetch('/api/test-cases/modules'),
                    fetch('/api/test-plans'),
                ]);
                this.modules = ((await modResp.json()).data || []);
                this.plans = ((await planResp.json()).data || []);
            } catch (e) {}
        },

        exportCases() {
            const params = new URLSearchParams();
            if (this.exportModule) params.set('module', this.exportModule);
            if (this.exportPriority) params.set('priority', this.exportPriority);
            window.open('/api/export/test-cases?' + params.toString(), '_blank');
        },

        exportPlan() {
            if (!this.exportPlanId) { showToast('请选择计划', 'error'); return; }
            window.open('/api/export/test-plan/' + this.exportPlanId, '_blank');
        },

        async handleFile(event, type) {
            const file = event.target.files[0];
            if (!file) return;
            const formData = new FormData();
            formData.append('file', file);
            try {
                const resp = await fetch('/api/import/preview', { method: 'POST', body: formData });
                this.preview = await resp.json();
                if (this.preview.valid_rows?.length > 0) {
                    this.$refs.previewDialog.showModal();
                } else {
                    showToast('文件中没有有效数据', 'error');
                }
            } catch (e) { showToast('文件解析失败', 'error'); }
            event.target.value = '';
        },

        async confirmImport() {
            if (!this.preview?.valid_rows) return;
            this.importing = true;
            try {
                const rows = this.preview.valid_rows.map(({_row, ...rest}) => rest);
                const resp = await fetch('/api/import/confirm', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ rows }),
                });
                const result = await resp.json();
                showToast(result.message, 'success');
                this.$refs.previewDialog.close();
                this.preview = null;
            } catch (e) { showToast('导入失败', 'error'); }
            finally { this.importing = false; }
        },
    }));
});
</script>
{% endblock %}
