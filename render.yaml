services:
  - type: web
    name: tcms
    runtime: python
    plan: free
    buildCommand: pip install -e .
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///data/tcms.db
    disk:
      name: tcms-data
      mountPath: /data
      sizeGB: 1
